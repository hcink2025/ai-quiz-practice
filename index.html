<html lang="zh-CN">
<head>

            border-radius: 10px;

            background: #e8f0fe;
        }

            border-color: #28a745;
            background: #d4edda;
        }
        .option.wrong {
            border-color: #dc3545;
            background: #f8d7da;
        }
        .option-key {
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }
        .option-text {
            color: #333;
            font-size: 15px;
        }
        .answer-reveal {
            color: #28a745;
            font-weight: bold;
            margin-top: 15px;
            padding: 10px;
            background: #d4edda;
            border-radius: 8px;
            display: none;
        }

            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

            padding: 12px 30px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s ease;

            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }

            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 20px;

            margin-bottom: 20px;
        }

            margin-bottom: 30px;

            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);

            gap: 15px;
            margin-bottom: 30px;

            border: 2px solid #dee2e6;
            background: white;
            cursor: pointer;
            transition: all 0.2s;

            border-color: #667eea;
            background: #e8f0fe;
            color: #667eea;
        }

            }

</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 AI易错题练习系统</h1>
            <p>共60道题目 | AI人工智能相关知识</p>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('practice')">练习模式</button>
            <button class="mode-btn" onclick="setMode('exam')">考试模式</button>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="label">当前进度</div>
                <div class="value" id="progress">0/60</div>
            </div>
            <div class="stat-item">
                <div class="label">正确率</div>
                <div class="value" id="accuracy">0%</div>
            </div>
            <div class="stat-item">
                <div class="label">已答题</div>
                <div class="value" id="answered">0</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

        <div id="questionsContainer"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="submitAll()">提交答案</button>
            <button class="btn btn-secondary" onclick="resetAll()">重新开始</button>
            <button class="btn btn-success" onclick="showAllAnswers()">显示答案</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="result-modal" id="resultModal">
        <h2>🎉 练习完成！</h2>
        <div class="score" id="finalScore">0/60</div>
        <div class="detail" id="resultDetail">正确率: 0%</div>
        <button class="btn btn-primary" onclick="closeModal()">继续练习</button>
    </div>

            {"id":435,"question":"如何在人工智能技术中处理采用不同的标准和数据格式的数据（）.","options":{"A":"在整个数据预处理过程中进行数据标准化","B":"通过转化算法将其转化为一致的模式","C":"进行全局分析，忽略数据源不同","D":"进行数据类型的编码以便于自动识别"},"answer":"B"},
            {"id":436,"question":"何谓\"黑匣子\"模型（）.","options":{"A":"单层的神经网络模型","B":"无法解释其工作原理的模型","C":"只能进行简单预测的模型","D":"难以解释其部分功能的模型"},"answer":"B"}
        ];

        let userAnswers = {};
        let currentMode = 'practice';
        let submitted = false;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (mode === 'exam') {
                document.querySelectorAll('.answer-reveal').forEach(el => el.style.display = 'none');
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = questions.map(q => `
                <div class="question-card" id="question-${q.id}">
                    <div class="question-header">
                        <span class="question-number">第 ${q.id} 题</span>
                    </div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${['A', 'B', 'C', 'D'].map(key => `
                            <div class="option" onclick="selectOption(${q.id}, '${key}')">
                                <span class="option-key">${key}</span>
                                <span class="option-text">${q.options[key]}</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="answer-reveal" id="answer-${q.id}">
                        正确答案: ${q.answer}
                    </div>
                </div>
            `).join('');
        }

        function selectOption(questionId, optionKey) {
            if (submitted && currentMode === 'exam') return;

            userAnswers[questionId] = optionKey;
            const card = document.getElementById(`question-${questionId}`);
            const options = card.querySelectorAll('.option');

            options.forEach(opt => opt.classList.remove('selected'));
            options[optionKey.charCodeAt(0) - 65].classList.add('selected');

            updateStats();

            if (currentMode === 'practice') {
                const correct = questions.find(q => q.id === questionId).answer;
                options.forEach((opt, i) => {
                    opt.classList.remove('correct', 'wrong');
                    if (i === correct.charCodeAt(0) - 65) {
                        opt.classList.add('correct');
                    } else if (i === optionKey.charCodeAt(0) - 65 && optionKey !== correct) {
                        opt.classList.add('wrong');
                    }
                });
                document.getElementById(`answer-${questionId}`).style.display = 'block';
            }
        }

        function updateStats() {
            const answered = Object.keys(userAnswers).length;
            const correct = Object.entries(userAnswers).filter(([id, ans]) => {
                const q = questions.find(q => q.id === parseInt(id));
                return q && q.answer === ans;
            }).length;

            document.getElementById('answered').textContent = answered;
            document.getElementById('progress').textContent = `${answered}/60`;
            document.getElementById('accuracy').textContent = answered > 0 ? `${Math.round(correct/answered*100)}%` : '0%';
            document.getElementById('progressFill').style.width = `${answered/60*100}%`;
        }

        function submitAll() {
            submitted = true;
            const answered = Object.keys(userAnswers).length;
            const correct = Object.entries(userAnswers).filter(([id, ans]) => {
                const q = questions.find(q => q.id === parseInt(id));
                return q && q.answer === ans;
            }).length;

            questions.forEach(q => {
                const card = document.getElementById(`question-${q.id}`);
                const options = card.querySelectorAll('.option');
                const userAns = userAnswers[q.id];

                options.forEach((opt, i) => {
                    opt.classList.remove('selected', 'correct', 'wrong');
                    if (i === q.answer.charCodeAt(0) - 65) {
                        opt.classList.add('correct');
                    }
                    if (userAns && i === userAns.charCodeAt(0) - 65 && userAns !== q.answer) {
                        opt.classList.add('wrong');
                    }
                });
                document.getElementById(`answer-${q.id}`).style.display = 'block';
            });

            document.getElementById('overlay').style.display = 'block';
            document.getElementById('resultModal').style.display = 'block';
            document.getElementById('finalScore').textContent = `${correct}/60`;
            document.getElementById('resultDetail').textContent = `正确率: ${Math.round(correct/60*100)}% | 已答: ${answered}题`;
        }

        function showAllAnswers() {
            questions.forEach(q => {
                document.getElementById(`answer-${q.id}`).style.display = 'block';
            });
        }

        function resetAll() {
            userAnswers = {};
            submitted = false;
            renderQuestions();
            updateStats();
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('resultModal').style.display = 'none';
        }

        renderQuestions();
    </script>
</body>
</html>
